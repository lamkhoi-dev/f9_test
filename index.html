
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Rendering Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Raleway:wght@800&display=swap" rel="stylesheet">
    <!-- Pannellum library for local 360 viewing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.2s ease-out;
      }
      .font-architecture {
        font-family: 'Raleway', sans-serif;
      }
      @keyframes glow {
        0%, 100% {
          text-shadow: 0 0 8px rgba(255, 255, 255, 0.7), 0 0 12px rgba(77, 192, 253, 0.7);
        }
        50% {
          text-shadow: 0 0 16px rgba(255, 255, 255, 0.9), 0 0 24px rgba(77, 192, 253, 0.9);
        }
      }
      .animate-glow {
        animation: glow 2.5s ease-in-out infinite;
      }
      .custom-scrollbar {
        scrollbar-width: thin; /* For Firefox */
        scrollbar-color: #a0aec0 #202633; /* For Firefox */
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #202633;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #a0aec0;
        border-radius: 2px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #e2e8f0;
      }

      /* Thiết lập chung cho bông tuyết */
      .snowflake {
        color: #fff; /* Màu trắng của tuyết */
        font-size: 1.1em; /* Kích thước bông tuyết */
        font-family: Arial;
        text-shadow: 0 0 1px #000; /* Viền nhẹ để dễ nhìn trên nền sáng */
        /* Vị trí cố định để phủ lên toàn màn hình */
        position: fixed;
        top: -10%;
        z-index: 9999; /* Đảm bảo tuyết nổi lên trên các thành phần khác */
        user-select: none; /* Không cho phép bôi đen/chọn */
        cursor: default;
        /* Cấu hình Animation */
        animation-name: snowflakes-fall, snowflakes-shake;
        animation-duration: 10s, 3s;
        animation-timing-function: linear, ease-in-out;
        animation-iteration-count: infinite, infinite;
        animation-play-state: running, running;
      }

      /* Animation 1: Rơi từ trên xuống */
      @keyframes snowflakes-fall {
        0% { top: -10%; }
        100% { top: 100%; }
      }

      /* Animation 2: Lắc lư qua lại */
      @keyframes snowflakes-shake {
        0% { transform: translateX(0px); }
        50% { transform: translateX(80px); }
        100% { transform: translateX(0px); }
      }

      /* Tạo sự ngẫu nhiên (Random) cho từng bông tuyết */
      .snowflake:nth-of-type(1) { left: 1%; animation-delay: 0s, 0s; }
      .snowflake:nth-of-type(2) { left: 10%; animation-delay: 1s, 1s; }
      .snowflake:nth-of-type(3) { left: 20%; animation-delay: 6s, .5s; }
      .snowflake:nth-of-type(4) { left: 30%; animation-delay: 4s, 2s; }
      .snowflake:nth-of-type(5) { left: 40%; animation-delay: 2s, 2s; }
      .snowflake:nth-of-type(6) { left: 50%; animation-delay: 8s, 3s; }
      .snowflake:nth-of-type(7) { left: 60%; animation-delay: 6s, 2s; }
      .snowflake:nth-of-type(8) { left: 70%; animation-delay: 2.5s, 1s; }
      .snowflake:nth-of-type(9) { left: 80%; animation-delay: 1s, 0s; }
      .snowflake:nth-of-type(10) { left: 90%; animation-delay: 3s, 1.5s; }
    </style>
<script type="importmap">
{

}
</script>
</head>
